version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: migration_postgres
    environment:
      POSTGRES_USER: migration_user
      POSTGRES_PASSWORD: migration_pass
      POSTGRES_DB: migration_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
